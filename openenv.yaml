spec_version: 1
name: easemydischarge-pm-env
type: space
runtime: fastapi
app: server.app:app
port: 8000
version: "1.0.0"
description: >
  Product Manager simulation for easemydischarge — an AI swarm that automates
  insurance claim pre-filling and hospital NOC coordination to reduce patient
  discharge time. Agent investigates system bottlenecks, proposes improvements,
  and submits a roadmap. Graded on concept coverage, investigation thoroughness,
  strategy quality, and roadmap completeness.
domain: healthcare

endpoints:
  reset: "/reset"
  step: "/step"
  state: "/state"
  tasks: "/tasks"
  grader: "/grader"

tasks:
  - id: easy
    name: Claim Pipeline Optimization
    difficulty: easy
    description: >
      Optimize the insurance claim pre-filling pipeline. Investigate the swarm
      agents and propose improvements to reduce errors and speed up processing.
    score_range: [0.0, 1.0]
    grader: "grader:grade_easy"
  - id: medium
    name: NOC Coordination Resolution
    difficulty: medium
    description: >
      Resolve NOC coordination deadlocks between hospital departments.
      Investigate inter-department conflicts, propose timeout and escalation
      mechanisms, and improve parallel coordination.
    score_range: [0.0, 1.0]
    grader: "grader:grade_medium"
  - id: hard
    name: Multi-Hospital Scaling Architecture
    difficulty: hard
    description: >
      Design a scaling architecture to expand from 1 hospital to 50. Address
      multi-tenancy, compliance, interoperability, monitoring, and phased rollout.
    score_range: [0.0, 1.0]
    grader: "grader:grade_hard"